[main]
terminal=konsole
font=Maple Mono NF:size=11
prompt=" │  "
lines=12
width=40
layer=overlay
anchor=center
icons-enabled=true
show-actions=false
fields=filename,name,generic,keywords,categories,comment
match-mode=fzf
keyboard-focus=on-demand
exit-on-keyboard-focus-loss=true
horizontal-pad=16
vertical-pad=12
inner-pad=8
line-height=40

[colors]
background=1e1e1eff
text=c8c8c8ff
prompt=D3ECCAff
input=eeeeecff
placeholder=77767bff
match=D3ECCAff
selection=D3ECCAff
selection-text=000000ff
selection-match=3E792Aff
border=a6da95ff
counter=77767bff

[border]
width=4
radius=12
selection-radius=8
